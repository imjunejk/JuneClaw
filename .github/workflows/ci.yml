name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        # Using `npm install` rather than `npm ci` because some of our
        # transitive deps (e.g. @napi-rs/* → @emnapi/*) resolve optional
        # variants differently across darwin (dev) and linux (CI), and a
        # darwin-generated lockfile won't satisfy `npm ci`'s strict match.
        # The --no-save flag keeps CI from dirtying the lockfile.
        run: npm install --no-save --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
